document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"width:334px;flex:none;background:#15171C;color:#E8E5DE;display:flex;flex-direction:column;overflow-y:auto;padding:30px 22px 24px\">\n    <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:#E8612C;text-transform:uppercase;margin-bottom:9px\">ELP Summer 2026<\u002Fdiv>\n    <div style=\"font-size:26px;font-weight:900;line-height:1.05;letter-spacing:-.01em\">Coach Training<\u002Fdiv>\n    <div style=\"font-size:14px;color:#8C9098;margin-top:5px;margin-bottom:24px\">Sports Curriculum Playbook<\u002Fdiv>\n\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;font-size:11px;font-family:'Space Mono',monospace;color:#8C9098;letter-spacing:.08em;margin-bottom:8px\">\n      <span>YOUR PROGRESS<\u002Fspan><span>{{ progressLabel }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"height:8px;border-radius:99px;background:#2A2E36;overflow:hidden;margin-bottom:28px\">\n      <div style=\"{{ progressBarStyle }}\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav style=\"display:flex;flex-direction:column;gap:4px\">\n      <sc-for list=\"{{ nav }}\" as=\"m\" hint-placeholder-count=\"7\">\n        <button onclick=\"{{ m.go }}\" style=\"{{ m.rowStyle }}\" style-hover=\"background:#23262E\">\n          <span style=\"{{ m.dotStyle }}\">{{ m.badge }}<\u002Fspan>\n          <span style=\"display:flex;flex-direction:column;align-items:flex-start;gap:1px;text-align:left\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.13em;color:#7E828A;text-transform:uppercase\">{{ m.kind }}<\u002Fspan>\n            <span style=\"font-size:15px;font-weight:700;line-height:1.2\">{{ m.title }}<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div style=\"margin-top:auto;padding-top:26px;font-size:10.5px;color:#5C6068;font-family:'Space Mono',monospace;letter-spacing:.05em\">STAFF USE ONLY · V1.0<\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0\">\n    <header style=\"padding:18px 52px;border-bottom:1px solid #E7E2D8;display:flex;align-items:center;justify-content:space-between;background:#FBF9F4;flex:none\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;min-width:0\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;color:#A8895E;text-transform:uppercase\">{{ active.kind }}<\u002Fspan>\n        <span style=\"font-size:17px;font-weight:800;letter-spacing:-.01em\">{{ active.title }}<\u002Fspan>\n      <\u002Fdiv>\n      <button onclick=\"{{ toggleComplete }}\" style=\"{{ completeBtnStyle }}\" style-hover=\"opacity:.88\">{{ completeBtnLabel }}<\u002Fbutton>\n    <\u002Fheader>\n\n    <div class=\"scl\" key=\"{{ active.index }}\" style=\"flex:1;overflow-y:auto;padding:48px 52px 44px\">\n      <div style=\"max-width:880px;margin:0 auto\">\n\n        <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;color:#E8612C;text-transform:uppercase;margin-bottom:18px\">● START HERE<\u002Fdiv>\n          <h1 style=\"font-size:46px;font-weight:900;line-height:1.04;letter-spacing:-.02em;margin:0 0 18px;text-wrap:balance\">Welcome to the field, Coach.<\u002Fh1>\n          <p style=\"font-size:19px;line-height:1.6;color:#4A4E56;max-width:660px;margin:0 0 36px\">This guide walks you through everything you need to run a great ELP sports session — the daily lesson flow, the social-emotional skills woven into every game, and the full library of drills and games with coaching cues for each grade band. Work through it once before your first session, then come back to any activity when you need it.<\u002Fp>\n\n          <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:18px;overflow:hidden;margin-bottom:42px\">\n            <div style=\"display:flex;align-items:center;gap:14px;padding:20px 26px;background:#EAF7F5;border-bottom:1px solid #D6EDE9\">\n              <span style=\"font-size:24px;line-height:1\">🎯<\u002Fspan>\n              <div>\n                <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;color:#2A857D;text-transform:uppercase;margin-bottom:3px\">Learning Outcomes<\u002Fdiv>\n                <div style=\"font-size:18px;font-weight:800;color:#1B1E25\">By the end of this module, you will be able to:<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <ul style=\"margin:0;padding:8px 26px 22px;list-style:none;display:flex;flex-direction:column;gap:2px\">\n              <li style=\"display:flex;gap:14px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F2EEE6\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#2BA39B;flex:none;width:22px;height:22px;border-radius:7px;background:#EAF7F5;display:flex;align-items:center;justify-content:center;margin-top:1px\">01<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#3A3E46\"><strong style=\"color:#1B1E25\">Define<\u002Fstrong> the structure of the general Summer Sports lesson and its steps.<\u002Fspan><\u002Fli>\n              <li style=\"display:flex;gap:14px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F2EEE6\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#2BA39B;flex:none;width:22px;height:22px;border-radius:7px;background:#EAF7F5;display:flex;align-items:center;justify-content:center;margin-top:1px\">02<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#3A3E46\"><strong style=\"color:#1B1E25\">Sequence<\u002Fstrong> a dynamic warm-up and organize students into balanced teams.<\u002Fspan><\u002Fli>\n              <li style=\"display:flex;gap:14px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F2EEE6\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#2BA39B;flex:none;width:22px;height:22px;border-radius:7px;background:#EAF7F5;display:flex;align-items:center;justify-content:center;margin-top:1px\">03<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#3A3E46\"><strong style=\"color:#1B1E25\">Facilitate<\u002Fstrong> a structured SEL discussion using the Name&nbsp;It, Connect&nbsp;It, Discuss&nbsp;It, Transfer&nbsp;It steps.<\u002Fspan><\u002Fli>\n              <li style=\"display:flex;gap:14px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F2EEE6\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#2BA39B;flex:none;width:22px;height:22px;border-radius:7px;background:#EAF7F5;display:flex;align-items:center;justify-content:center;margin-top:1px\">04<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#3A3E46\"><strong style=\"color:#1B1E25\">Demonstrate<\u002Fstrong> how to set up, explain, and safely run a skill drill or game.<\u002Fspan><\u002Fli>\n              <li style=\"display:flex;gap:14px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #F2EEE6\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#2BA39B;flex:none;width:22px;height:22px;border-radius:7px;background:#EAF7F5;display:flex;align-items:center;justify-content:center;margin-top:1px\">05<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#3A3E46\"><strong style=\"color:#1B1E25\">Apply<\u002Fstrong> grade-band modifications (TK–2, 3rd–4th, 5th–6th) to match an activity to the group in front of you.<\u002Fspan><\u002Fli>\n              <li style=\"display:flex;gap:14px;align-items:flex-start;padding:11px 0\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#2BA39B;flex:none;width:22px;height:22px;border-radius:7px;background:#EAF7F5;display:flex;align-items:center;justify-content:center;margin-top:1px\">06<\u002Fspan><span style=\"font-size:16px;line-height:1.5;color:#3A3E46\"><strong style=\"color:#1B1E25\">Order<\u002Fstrong> a rules meeting by safety, fun, and gameplay priority before starting a game.<\u002Fspan><\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n\n          <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:#A8895E;text-transform:uppercase;margin-bottom:16px\">What's inside<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:42px\">\n            <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:16px;padding:22px 20px\">\n              <div style=\"font-size:26px;margin-bottom:10px\">📋<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:800;margin-bottom:5px\">The Lesson Flow<\u002Fdiv>\n              <div style=\"font-size:14px;line-height:1.5;color:#6B7078\">Six repeatable steps that structure every single session.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:16px;padding:22px 20px\">\n              <div style=\"font-size:26px;margin-bottom:10px\">🧠<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:800;margin-bottom:5px\">SEL Skills<\u002Fdiv>\n              <div style=\"font-size:14px;line-height:1.5;color:#6B7078\">How to name, connect, and coach a social-emotional skill through sport.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:16px;padding:22px 20px\">\n              <div style=\"font-size:26px;margin-bottom:10px\">🏀<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:800;margin-bottom:5px\">Drills &amp; Games<\u002Fdiv>\n              <div style=\"font-size:14px;line-height:1.5;color:#6B7078\">Setup, rules, what to look for, and grade-band modifications for each activity.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#1B1E25;color:#EDEAE2;border-radius:18px;padding:30px 32px\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:#E8612C;text-transform:uppercase;margin-bottom:16px\">How to use this guide<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'Space Mono',monospace;color:#E8612C;font-weight:700;font-size:15px\">01<\u002Fspan><span style=\"font-size:16px;line-height:1.5\">Review the lesson flow and your day's activities <strong>before<\u002Fstrong> students arrive — know the rules well enough to explain them clearly and safely.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'Space Mono',monospace;color:#E8612C;font-weight:700;font-size:15px\">02<\u002Fspan><span style=\"font-size:16px;line-height:1.5\">Every drill lists <strong>grade-band modifications<\u002Fstrong> (TK–2, 3rd–4th, 5th–6th). Match the activity to the group in front of you.<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"font-family:'Space Mono',monospace;color:#E8612C;font-weight:700;font-size:15px\">03<\u002Fspan><span style=\"font-size:16px;line-height:1.5\">Mark each section <strong>complete<\u002Fstrong> as you finish it, then take the Knowledge Check at the end.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isOutline }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#FFF4ED;border:1px solid #F4D6C4;border-radius:16px;padding:22px 24px;margin-bottom:34px;display:flex;gap:16px;align-items:flex-start\">\n            <span style=\"font-size:24px;line-height:1\">⏱️<\u002Fspan>\n            <div>\n              <div style=\"font-size:16px;font-weight:800;margin-bottom:4px\">Planning &amp; Prep — 30 min before every lesson<\u002Fdiv>\n              <div style=\"font-size:15px;line-height:1.55;color:#6B5A4C\">Review the day's plan and identify materials, field setup, and weather or space considerations. Know the day's SEL word and how it connects to your game or drill. Understand the rules well enough to explain them to your grade group.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:0;position:relative\">\n            <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;gap:22px;padding-bottom:26px;position:relative\">\n                <div style=\"flex:none;display:flex;flex-direction:column;align-items:center\">\n                  <div style=\"width:46px;height:46px;border-radius:13px;background:#1B1E25;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:17px\">{{ s.n }}<\u002Fdiv>\n                  <div style=\"{{ s.lineStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;padding-bottom:4px\">\n                  <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px\">\n                    <span style=\"font-size:21px;font-weight:800\">{{ s.title }}<\u002Fspan>\n                    <span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#E8612C;background:#FBEBE2;padding:3px 10px;border-radius:20px\">{{ s.time }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <ul style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:5px\">\n                    <sc-for list=\"{{ s.points }}\" as=\"p\" hint-placeholder-count=\"2\">\n                      <li style=\"font-size:15.5px;line-height:1.5;color:#4A4E56\">{{ p }}<\u002Fli>\n                    <\u002Fsc-for>\n                  <\u002Ful>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isSel }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"font-size:18px;line-height:1.6;color:#4A4E56;max-width:680px;margin:0 0 32px\">Every session includes a short social-emotional skill discussion tied to that day's game. Keep it tight — name the skill, connect it to play, hear 2–4 voices, then transfer it beyond the field.<\u002Fp>\n\n          <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:#A8895E;text-transform:uppercase;margin-bottom:16px\">Structure every discussion<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:40px\">\n            <sc-for list=\"{{ selSteps }}\" as=\"d\" hint-placeholder-count=\"4\">\n              <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:16px;padding:20px 22px\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n                  <span style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#fff;background:#2BA39B;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center\">{{ d.n }}<\u002Fspan>\n                  <span style=\"font-size:17px;font-weight:800\">{{ d.title }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:14.5px;line-height:1.5;color:#6B7078\">{{ d.body }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.14em;color:#A8895E;text-transform:uppercase;margin-bottom:16px\">Skill bank — tap a category<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px\">\n            <sc-for list=\"{{ selCats }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ c.pick }}\" style=\"{{ c.pillStyle }}\">{{ c.name }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:16px;overflow:hidden\">\n            <sc-for list=\"{{ activeSkills }}\" as=\"sk\" hint-placeholder-count=\"5\">\n              <div style=\"display:grid;grid-template-columns:200px 1fr;gap:18px;padding:16px 22px;border-top:1px solid #F0EBE1;align-items:start\">\n                <div style=\"font-size:15.5px;font-weight:800;color:#1B1E25\">{{ sk.skill }}<\u002Fdiv>\n                <div style=\"font-size:15px;line-height:1.5;color:#5A5E66\">{{ sk.prompt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isDrills }}\" hint-placeholder-val=\"{{ true }}\">\n          <sc-if value=\"{{ active.intro }}\">\n            <p style=\"font-size:18px;line-height:1.6;color:#4A4E56;max-width:700px;margin:0 0 28px\">{{ active.intro }}<\u002Fp>\n          <\u002Fsc-if>\n\n          <div style=\"display:flex;flex-direction:column;gap:26px\">\n            <sc-for list=\"{{ cards }}\" as=\"card\" hint-placeholder-count=\"2\">\n              <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:20px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)\">\n                <div style=\"padding:24px 26px 18px;border-bottom:1px solid #F0EBE1\">\n                  <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap\">\n                    <span style=\"{{ card.kindStyle }}\">{{ card.kind }}<\u002Fspan>\n                    <sc-if value=\"{{ card.video }}\">\n                      <a href=\"{{ card.video }}\" target=\"_blank\" style=\"font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#2BA39B;text-decoration:none;display:inline-flex;align-items:center;gap:5px\">▶ REFERENCE VIDEO<\u002Fa>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"font-size:25px;font-weight:900;letter-spacing:-.01em;margin-bottom:14px\">{{ card.name }}<\u002Fdiv>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n                    <sc-for list=\"{{ card.focus }}\" as=\"f\" hint-placeholder-count=\"3\">\n                      <span style=\"font-size:12.5px;font-weight:700;color:#9A6A4E;background:#FBEEE6;border:1px solid #F2DDCF;padding:4px 11px;border-radius:20px\">{{ f }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div>\n                  <sc-for list=\"{{ card.sections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n                    <div style=\"border-bottom:1px solid #F0EBE1\">\n                      <button onclick=\"{{ sec.toggle }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 26px;background:none;border:none;cursor:pointer;text-align:left\" style-hover=\"background:#FBF9F4\">\n                        <span style=\"font-size:15px;font-weight:800;color:#1B1E25;display:flex;align-items:center;gap:10px\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;color:#E8612C\">{{ sec.num }}<\u002Fspan>{{ sec.label }}<\u002Fspan>\n                        <span style=\"font-size:20px;color:#B8AE9E;font-weight:400;line-height:1\">{{ sec.sign }}<\u002Fspan>\n                      <\u002Fbutton>\n                      <sc-if value=\"{{ sec.open }}\">\n                        <ul style=\"margin:0;padding:0 26px 18px 46px;display:flex;flex-direction:column;gap:7px;list-style:none\">\n                          <sc-for list=\"{{ sec.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n                            <li style=\"font-size:15px;line-height:1.5;color:#4A4E56;position:relative;padding-left:16px\"><span style=\"position:absolute;left:0;top:0;color:#E8612C\">›<\u002Fspan>{{ it }}<\u002Fli>\n                          <\u002Fsc-for>\n                        <\u002Ful>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <sc-if value=\"{{ card.hasChips }}\">\n                  <div style=\"padding:20px 26px;background:#FBF9F4\">\n                    <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:#A8895E;text-transform:uppercase;margin-bottom:12px\">Movement bank — mix &amp; match<\u002Fdiv>\n                    <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n                      <sc-for list=\"{{ card.chips }}\" as=\"ch\" hint-placeholder-count=\"8\">\n                        <span style=\"font-size:13.5px;font-weight:700;color:#1B1E25;background:#fff;border:1px solid #E2DCD0;padding:6px 12px;border-radius:9px\">{{ ch }}<\u002Fspan>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <sc-if value=\"{{ card.hasBands }}\">\n                  <div style=\"padding:20px 26px;background:#FBF9F4;border-top:1px solid #F0EBE1\">\n                    <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:#A8895E;text-transform:uppercase;margin-bottom:12px\">Grade-band modifications<\u002Fdiv>\n                    <div style=\"display:flex;gap:7px;margin-bottom:16px\">\n                      <sc-for list=\"{{ card.bandTabs }}\" as=\"b\" hint-placeholder-count=\"3\">\n                        <button onclick=\"{{ b.pick }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <ul style=\"margin:0;padding-left:18px;display:flex;flex-direction:column;gap:7px\">\n                      <sc-for list=\"{{ card.bandItems }}\" as=\"bi\" hint-placeholder-count=\"3\">\n                        <li style=\"font-size:15px;line-height:1.5;color:#4A4E56\">{{ bi }}<\u002Fli>\n                      <\u002Fsc-for>\n                    <\u002Ful>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n\n                <div style=\"padding:20px 26px;background:#15171C\">\n                  <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:#E8612C;text-transform:uppercase;margin-bottom:13px\">Phrases to use<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:9px\">\n                    <sc-for list=\"{{ card.phrases }}\" as=\"ph\" hint-placeholder-count=\"3\">\n                      <div style=\"font-size:15.5px;line-height:1.45;color:#E8E5DE;font-style:italic\">“{{ ph }}”<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;background:#1B1E25;color:#fff;border-radius:16px;padding:22px 26px;margin-bottom:30px\">\n            <div>\n              <div style=\"font-size:20px;font-weight:900\">Knowledge Check<\u002Fdiv>\n              <div style=\"font-size:14.5px;color:#9CA0A8;margin-top:2px\">Answer each question to confirm you're ready to coach.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right;flex:none\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:30px;font-weight:700;color:#E8612C;line-height:1\">{{ quizScore }}<\u002Fdiv>\n              <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#7E828A;letter-spacing:.08em\">CORRECT<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:22px\">\n            <sc-for list=\"{{ questions }}\" as=\"q\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fff;border:1px solid #E7E2D8;border-radius:18px;padding:24px 26px\">\n                <div style=\"display:flex;gap:12px;margin-bottom:18px\">\n                  <span style=\"font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#E8612C;flex:none\">Q{{ q.num }}<\u002Fspan>\n                  <span style=\"font-size:18px;font-weight:800;line-height:1.4\">{{ q.q }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ q.options }}\" as=\"o\" hint-placeholder-count=\"4\">\n                    <button onclick=\"{{ o.pick }}\" style=\"{{ o.style }}\">\n                      <span style=\"{{ o.letterStyle }}\">{{ o.letter }}<\u002Fspan>\n                      <span style=\"flex:1\">{{ o.text }}<\u002Fspan>\n                      <span style=\"font-weight:800\">{{ o.mark }}<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-if value=\"{{ q.answered }}\">\n                  <div style=\"{{ q.explainStyle }}\">{{ q.explain }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <footer style=\"padding:15px 52px;border-top:1px solid #E7E2D8;display:flex;justify-content:space-between;align-items:center;background:#FBF9F4;flex:none\">\n      <button onclick=\"{{ prev }}\" style=\"{{ prevStyle }}\" style-hover=\"opacity:.85\">← Previous<\u002Fbutton>\n      <span style=\"font-family:'Space Mono',monospace;font-size:12px;color:#A8895E;letter-spacing:.06em\">{{ stepLabel }}<\u002Fspan>\n      <button onclick=\"{{ next }}\" style=\"{{ nextStyle }}\" style-hover=\"opacity:.9\">{{ nextLabel }}<\u002Fbutton>\n    <\u002Ffooter>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E8612C&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#E8612C&quot;,&quot;#2A6FDB&quot;,&quot;#1F8A5B&quot;,&quot;#B5402E&quot;]},&quot;teal&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2BA39B&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#2BA39B&quot;,&quot;#7A6CE0&quot;,&quot;#E0A23A&quot;,&quot;#3E8FD0&quot;]}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { active:0, completed:{}, open:{}, band:{}, cat:0, quiz:{} };\n\n    this.course = [\n      { kind:'Start Here', title:'Welcome, Coach', type:'intro' },\n      { kind:'Lesson Structure', title:'The Daily Lesson Flow', type:'outline' },\n      { kind:'Activity · 10 min', title:'Dynamic Warm-Up', type:'drills',\n        cards:[{\n          id:'warmup', kind:'Warm-Up', video:null,\n          name:'Color-Cone Relay Warm-Up',\n          focus:['Activation','Team organization','Movement prep'],\n          setup:[\n            'Arrange different colored cones in a straight line to create the start cones.',\n            'Place a matching cone 10–15 yards away from each start cone to create the end cones.',\n            'Divide students into 4–6 teams depending on group size and available cone colors.',\n            'Assign each student a cone color; line each team up behind their start cone facing the end cone.'\n          ],\n          doIt:[\n            'Select, explain and demonstrate the movement (high knees, skipping, lunges, etc.).',\n            'On the coach\\u2019s signal, the first student in each line performs the movement to the matching end cone.',\n            'At the end cone, students go to the back of their team\\u2019s line; the next student goes.',\n            'Repeat with different movements — the warm-up should last at least 10 minutes.'\n          ],\n          assess:[\n            'Are students performing the movement as directed (e.g. high knees bending past 90°)?',\n            'Emphasize control over speed — proper form before pace.',\n            'Reinforce purpose: a good warm-up prepares the body and prevents injury.',\n            'Check team organization — students return to their own color group.'\n          ],\n          phrases:[\n            'Let\\u2019s try that again — best effort, you don\\u2019t need to be perfect.',\n            'Control first. Speed comes later.',\n            'Back to your color — Green to Green, Red to Red!'\n          ],\n          chips:['Marching bands','Ankle taps','Snowboard hops','Side shuffles','High knees','High kicks','Arm circles','Karaokes','Lunges','Bear crawls','Frog jumps','Pogo-hops']\n        }]\n      },\n      { kind:'Whole Child', title:'SEL Components', type:'sel' },\n      { kind:'Basketball · Drills', title:'Basketball Skill Drills', type:'drills',\n        intro:'Structured drills targeting dribbling, passing, and shooting fundamentals. Each drill includes grade-band modifications for TK–2, 3rd–4th, and 5th–6th.',\n        cards:[\n          { id:'bd1', kind:'Drill', video:'https://www.youtube.com/watch?v=SS96BlIBjJ4', name:'Dribble Intro',\n            focus:['Ball control','Consistent height','Eyes up'],\n            setup:['Use a court or open blacktop with clear sidelines.','Give each student a basketball (or share if supply is limited).','Line students along one sideline with space to move.'],\n            doIt:['Students dribble one-handed from sideline to sideline.','Players keep their head up the entire time.','Stop at the far sideline or return — coach\\u2019s choice.'],\n            assess:['Are eyes up, or staring at the ball?','Is the dribble at a consistent waist-level height?','Are students using fingertips, not palms?','Is the ball staying under control?'],\n            phrases:['Eyes up — find a spot and keep your eyes on it!','Fingertips, not your palm — dribble like the ball is hot!','Nice — you barely looked at the ball that time.'],\n            bands:[\n              { key:'TK–2', items:['Allow both hands, or self-toss and catch instead of a full dribble.','Use lighter balls (handballs or foam) if a basketball is too heavy.'] },\n              { key:'3rd–4th', items:['Require both dominant and non-dominant hand.','Add a mid-activity cue: switch hands on the coach\\u2019s signal.'] },\n              { key:'5th–6th', items:['Alternate hands every 3 dribbles.','Increase pace — dribble at a jog while keeping control.'] }\n            ]\n          },\n          { id:'bd2', kind:'Drill', video:null, name:'Zig-Zag Dribble',\n            focus:['Change of direction','Agility','Ball control'],\n            setup:['Set a zig-zag line of cones 4–6 feet apart with clear start and end points.','Each student lines up at the start with a basketball.','Leave space between lines so students don\\u2019t collide.'],\n            doIt:['Students dribble through the cones in a zig-zag pattern.','At each cone they change direction while keeping control.','Avoid knocking over cones; return to the back of the line after finishing.'],\n            assess:['Small, controlled touches — not big swings?','Clean direction changes at each cone, not drifting wide?','Using both hands through the changes?','Looking up occasionally, not staring down?'],\n            phrases:['Small touches — keep the ball close to your body.','Attack the cone, then change direction. Don\\u2019t drift around it.','Use the crossover — switch hands at the cone!'],\n            bands:[\n              { key:'TK–2', items:['Widen cone spacing to 6–8 feet for gradual turns.','Allow carrying the ball around cones if dribbling is too hard.','Walk the course first without a ball.'] },\n              { key:'3rd–4th', items:['Tighten spacing to ~4 feet for sharper changes.','Require a crossover at each cone.','No stopping between cones — keep moving.'] },\n              { key:'5th–6th', items:['Non-dominant hand only through the full course.','Add a time challenge — beat your previous best.','Add a second ball for an advanced coordination challenge.'] }\n            ]\n          },\n          { id:'bd3', kind:'Drill', video:null, name:'Bounce Passing',\n            focus:['Passing accuracy','Receiving technique','Ball control'],\n            setup:['Students pair up 5–6 feet apart, one ball per pair.','Partners face each other in a stationary position — no movement.'],\n            doIt:['Players pass back and forth with a single bounce pass.','The ball bounces once and arrives at chest level.','Receiver uses soft hands and brings the ball to their chest.'],\n            assess:['Does the ball bounce once and arrive at chest height?','Are students stepping into the pass with the opposite foot?','Soft hands — not slapping or clapping at the ball?','Pushing through with thumbs down on release?'],\n            phrases:['Aim for the floor — two-thirds of the way to your partner.','Thumbs down on the release!','Soft hands — bring it in, don\\u2019t swat at it.'],\n            bands:[\n              { key:'TK–2', items:['Reduce distance to 3–4 feet so the bounce arrives cleanly.','Allow a two-hand bounce pass.','Focus on one clean bounce; simplify catching form.'] },\n              { key:'3rd–4th', items:['Emphasize stepping with the opposite foot.','Prompt the \\u201Cthumbs down\\u201D release cue.','Add a floor target (cone or tape) to aim the bounce.'] },\n              { key:'5th–6th', items:['Require the pass to hit a specific floor target.','Add movement — both players shuffle side to side while passing.','Discuss: when do you use a bounce pass in a game?'] }\n            ]\n          }\n        ]\n      },\n      { kind:'Basketball · Games', title:'Basketball Games', type:'drills',\n        intro:'Active games that reinforce dribbling, shooting, and teamwork in a fun, competitive format. Keep rotations fast and energy high.',\n        cards:[\n          { id:'bg1', kind:'Game', video:'https://www.youtube.com/watch?v=0_pPYnND1-w', name:'Dribble Knockout',\n            focus:['Control under pressure','Spatial awareness','Eyes-up dribbling'],\n            setup:['Number playing areas 1–6 across the court; mark each as an 8–10 ft circle.','Split students into one line per circle; each needs a ball on their turn.'],\n            doIt:['First player from each line dribbles inside their circle.','Protect your own ball while knocking opponents\\u2019 balls out of the circle.','Ball out = you\\u2019re out; hand off to the next in line.','King-of-the-court: winner moves toward Court 1, loser toward Court 6.'],\n            assess:['Head up, or staring at the ball?','Dribble staying low and controlled?','Using the body to shield, not the hands to push?','Tracking multiple opponents at once?'],\n            phrases:['Eyes up — you can\\u2019t protect your ball if you\\u2019re staring at it!','Use your body to shield — not your hands. No pushing!','Stay low. Lower dribble = harder to knock away.'],\n            bands:[\n              { key:'TK–2', items:['Use larger circles and limit to 2–3 players each.','Allow walking while dribbling.'] },\n              { key:'3rd–4th', items:['Enforce the dribble — picking up the ball = out.','Shield with the body, not the hands.','Run 2–3 short rounds to keep rotation fast.'] },\n              { key:'5th–6th', items:['Shrink the circle to raise difficulty.','Require non-dominant hand for one full round.','Challenge Court 1 winners to a final 1v1.'] }\n            ]\n          },\n          { id:'bg2', kind:'Game', video:'https://www.youtube.com/watch?v=MyatveNZh_0', name:'Lightning',\n            focus:['Shooting under pressure','Free-throw form','Quick rebounding'],\n            setup:['Use two basketballs; whole group in a single line at the free-throw line.','First two players each hold a ball to start.'],\n            doIt:['First player shoots from the line; second shoots right after.','First shot from the free-throw line; after that, shoot from anywhere.','Make your shot before the player behind you, or you\\u2019re out.','Last player standing wins.'],\n            assess:['Composed shot, or rushing wildly?','Rebounding quickly for the follow-up?','Aware of where the player behind them is?','Eliminated players stepping back safely?'],\n            phrases:['Take a breath — don\\u2019t rush just because there\\u2019s pressure!','Rebound fast! Get back up as soon as it\\u2019s in or out.','Make it, pass quick, get to the back of the line!'],\n            bands:[\n              { key:'TK–2', items:['Use a lower hoop or closer line and a smaller ball.','Use a \\u201CTop 5\\u201D rule — round ends at 5 players to cut wait time.'] },\n              { key:'3rd–4th', items:['Enforce the free-throw line for the first shot.','Remind students to rebound their own shot immediately.'] },\n              { key:'5th–6th', items:['Full rules, no modifications.','Narrate the final 3 players to build excitement.','Require proper free-throw form on the first shot.'] }\n            ]\n          },\n          { id:'bg3', kind:'Game', video:null, name:'Sharks & Minnows Dribble',\n            focus:['Dribbling under pressure','Ball protection','Spatial awareness'],\n            setup:['Define a boundary with cones — half court suits most groups.','Every minnow has a ball and starts inside; pick 1–2 sharks with no ball.','Mark sharks with a pinnie or vest if available.'],\n            doIt:['Minnows dribble freely, protecting the ball from sharks.','Sharks knock balls out of bounds using hands only — no body contact.','Ball out or loss of control = eliminated, sit until the next round.','Last minnow dribbling wins; rotate shark roles between rounds.'],\n            assess:['Dribble low and shielded, or high and exposed?','Using the full space, or clustering in corners?','Head up to track the sharks?','Sharks cutting off space, or chasing randomly?'],\n            phrases:['Keep your dribble low — a high bounce is easy to knock away!','Put your body between the shark and the ball.','Sharks — work together. Cut off their space, don\\u2019t just chase.'],\n            bands:[\n              { key:'TK–2', items:['Use a larger boundary and a single shark.','Allow walking the dribble.','Let eliminated players rejoin after 5 jumping jacks.'] },\n              { key:'3rd–4th', items:['Enforce a real dribble — picking up the ball = out.','Use 2 sharks for groups of 12+.','Shrink the boundary every 30 seconds.'] },\n              { key:'5th–6th', items:['Non-dominant hand for the whole round.','Shrink the boundary from the start.','Minnows can\\u2019t stay still more than 3 seconds.'] }\n            ]\n          }\n        ]\n      },\n      { kind:'Assessment', title:'Knowledge Check', type:'quiz',\n        questions:[\n          { q:'How long should the Planning & Prep window be before every lesson?', options:['5 minutes','15 minutes','30 minutes','It varies — no set time'], answer:2, explain:'Plan for 30 minutes before every lesson to review the plan, prep materials and setup, and know your SEL word and rules.' },\n          { q:'In the daily lesson flow, the game should take up:', options:['About 5 minutes','Roughly equal time to the warm-up','The majority of the session (20+ min)','Only the leftover time at the end'], answer:2, explain:'The game is the heart of the session — at least 20 minutes. Run one skill drill (more if time allows) but protect game time.' },\n          { q:'What is the correct order to cover rules in a Rules Meeting?', options:['Fun rules, then safety, then how to play','Safety (high priority), fun rules (low priority), then game rules','How to play, then safety','Whatever the students ask about first'], answer:1, explain:'Lead with safety rules (high priority), then the extra/fun rules (low priority), then explain how to play — circling back to high/low priority as needed.' },\n          { q:'A 1st grader (TK–2) struggles to dribble the full course. The best move is to:', options:['Have them sit out until they improve','Apply the TK–2 modification — allow carrying the ball or widen the spacing','Make them keep trying the full version','Pair them with a 6th grader'], answer:1, explain:'Use the grade-band modifications. For TK–2 that often means allowing the ball to be carried, widening cone spacing, or walking the course first.' },\n          { q:'In an SEL discussion, you should aim to hear from:', options:['Every single student','2–4 student voices','Only students who volunteer twice','Just one strong example'], answer:1, explain:'Target 2–4 voices — quality over quantity. Use think time and turn-and-talk, then transfer the skill beyond the field.' }\n        ]\n      }\n    ];\n  }\n\n  componentDidMount(){\n    try{\n      var c = JSON.parse(localStorage.getItem('elp_completed_v1')||'{}');\n      var a = parseInt(localStorage.getItem('elp_active_v1')||'0',10);\n      this.setState({ completed: c||{}, active: (isNaN(a)||a<0||a>=this.course.length)?0:a });\n    }catch(e){}\n  }\n\n  persist(){\n    try{\n      localStorage.setItem('elp_completed_v1', JSON.stringify(this.state.completed));\n      localStorage.setItem('elp_active_v1', String(this.state.active));\n    }catch(e){}\n  }\n\n  go(i){ this.setState({active:i}, ()=>{ this.persist(); var el=document.querySelector('.scl'); if(el) el.scrollTop=0; }); }\n  next(){ this.go(Math.min(this.course.length-1, this.state.active+1)); }\n  prev(){ this.go(Math.max(0, this.state.active-1)); }\n  toggleComplete(){ var a=this.state.active; var c=Object.assign({},this.state.completed); c[a]=!c[a]; this.setState({completed:c}, ()=>this.persist()); }\n  toggleSection(k){ var o=Object.assign({},this.state.open); o[k]=!this.isOpen(k); this.setState({open:o}); }\n  isOpen(k){ var v=this.s .chips.length), chips:card.chips||[],\n        phrases:card.phrases\n      };\n    });\n  }\n\n  renderVals(){\n    var self=this; var st=this.state; var A=(this.props&&this.props.accent)||'#E8612C'; var T=(this.props&&this.props.teal)||'#2BA39B';\n    var total=this.course.length;\n    var done=0; for(var i=0;i<total;i++){ if(st.completed[i]) done++; }\n    var pct=Math.round(done/total*100);\n\n    var nav=this.course.map(function(m,i){\n      var on=i===st.active; var cp=!!st.completed[i];\n      return {\n        kind:m.kind, title:m.title, go:function(){ self.go(i); },\n        badge: cp?'\\u2713':String(i+1).padStart(2,'0'),\n        rowStyle:{ display:'flex', gap:'12px', alignItems:'center', padding:'11px 12px', borderRadius:'12px', border:'none', cursor:'pointer', width:'100%', background:on?'#23262E':'transparent' },\n        dotStyle:{ width:'31px', height:'31px', flex:'none', borderRadius:'9px', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:\"'Space Mono',monospace\", fontSize:'12px', fontWeight:700, background: cp?T:(on?A:'#2A2E36'), color:(cp||on)?'#fff':'#8C9098' }\n      };\n    });\n\n    var act=this.course[st.active]||{};\n    var type=act.type;\n    var activeView={ index:st.active, kind:act.kind, title:act.title, intro:act.intro||'' };\n\n    var vals={\n      nav:nav,\n      progressLabel: done+' / '+total,\n      progressBarStyle:{ height:'100%', width:pct+'%', background:A, borderRadius:'99px', transition:'width .4s ease' },\n      active: activeView,\n      isIntro: type==='intro', isOutline: type==='outline', isSel: type==='sel', isDrills: type==='drills', isQuiz: type==='quiz',\n      toggleComplete:function(){ self.toggleComplete(); },\n      completeBtnLabel: st.completed[st.active] ? '\\u2713 Completed' : 'Mark complete',\n      completeBtnStyle: st.completed[st.active]\n        ? { background:'transparent', color:T, border:'2px solid '+T, padding:'9px 16px', borderRadius:'10px', fontWeight:800, fontSize:'14px' ates and modeling positive behavior.'}\n        ]},\n        {name:'Decision-Making',skills:[\n          {skill:'Strategic Thinking',prompt:'Deciding when to pass, shoot, or dribble.'},\n          {skill:'Fair Play',prompt:'Following rules and playing honestly.'},\n          {skill:'Safety Awareness',prompt:'Playing in control to avoid collisions or unsafe actions.'},\n          {skill:'Accountability',prompt:'Taking responsibility for mistakes or fouls.'}\n        ]},\n        {name:'Self-Awareness',skills:[\n          {skill:'Confidence',prompt:'Believing in one\\u2019s ability to contribute to the team.'},\n          {skill:'Growth Mindset',prompt:'Recognizing that skills improve with practice.'},\n          {skill:'Self-Reflection',prompt:'Thinking about what went well and what could improve.'},\n          {skill:'Emotional Awareness',prompt:'Recognizing feelings like frustration or excitement during play.'}\n        ]}\n      ];\n      var ci=st.cat||0;\n      vals.selCats=cats.map(function(c,i){\n        var on=i===ci;\n        return { name:c.name, pick:function(){ self.setCat(i); },\n          pillStyle:{ fontFamily:\"'Nunito',sans-serif\", fontSize:'14px', fontWeight:800, padding:'9px 16px', borderRadius:'11px', cursor:'pointer',\n            border:'2px solid '+(on?'#2BA39B':'#E2DCD0'), background:on?'#2BA39B':'#fff', color:on?'#fff':'#6B7078' } };\n      });\n      vals.activeSkills=cats[ci].skills;\n    }\n\n    if(type==='drills'){\n      vals.cards=this.buildCards(act);\n    }\n\n    if(type==='quiz'){\n      var correct=0;\n      vals.questions=(act.questions||[]).map(function(q,qi){\n        var sel=st.quiz[qi]; var answered=sel!=null;\n        if(answered && sel===q.answer) correct++;\n        var letters=['A','B','C','D','E'];\n        var options=q.options.map(function(opt,oi){\n          var isAns=oi===q.answer; var chosen=oi===sel;\n          var base={ display:'flex', gap:'12px', alignItems:'flex-start', width:'100%', textAlign:'left', padding:
